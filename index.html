ns of Privacy. Video surveillance may not be installed or operated in an area where there is a reasonable expectation of privacy. Examples include but are not limited to: bathrooms, locker rooms, and non-common areas.\nThere are two exceptions as it pertains to privacy. \nFirst, the operation of covert video surveillance by the University of Utah Department of Public Safety, in conjunction with a criminal investigation, or legitimate security concern in an area not covered by existing cameras is permitted, with the written approval of the Chief Safety Officer (CSO.)\nSecond, the installation and operation of video surveillance to provide patient monitoring in clinical areas. \nImproper or unauthorized dissemination. The copying or duplication of video surveillance recording is limited to persons authorized by the CSO. Using an external device, such as a phone to record video from a monitoring system is also prohibited. Information obtained from reviewing the surveillance recordings may not be disseminated without the written approval of the CSO. All requests to copy, duplicate, or share video surveillance recordings are subject to review by S SAC. \nUnauthorized access. Authorized individuals with access to operate video surveillance or review video surveillance recordings must take appropriate measures to prevent unauthorized access. \nFor example: \nAuthorized users shall not share their credentials to the video surveillance system \nWork stations shall be locked when not in use\nMonitor screens shall be positioned or have a privacy screen installed to prevent others from viewing video surveillance \nAs a reminder: \nAccess logs shall be reviewed periodically by S SAC\nViolations of policy 3  dash 234 are subject to disciplinary action\nImproper usage or dissemination of information obtained from video surveillance shall be reported to S SAC.","voiceCode":"en-US-AshleyNeural","language":"en","originalResourceId":"RoHT6c2xsKgM2ieCF","ssml":"\u003cspeak \n hBreak\",\"version\":1,\"duration\":0.5}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AshleyNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Click the buttons below to learn more about these stakeholders\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AshleyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"There are several stakeholders involved in the administration, operation, and governance of video surveillance, including the Department of Public Safety Chief Safety Officer (CSO), U Facilities, Surveillance System Administrators Committee (S SAC), and the Office of General Counsel.\nPolicy 3  dash 234 - Building Access and Surveillance Systems was approved in 2019. This policy governs the installation, administration, maintenance, operation, and playback of video surveillance. \n\nIn accordance with University policy 3 dash 234, the Surveillance System Administrators Committee, or S SAC, is charged with establishing the implementation, process and procedures, policy goals, as well as keeping updated inventory of all existing building access surveillance systems at the University of Utah. \nS SAC is the reviewing authority for requests to install video surveillance cameras, operate video surveillance cameras, and to review video surveillance recordings, for non-law enforcement purposes. \nClick the button below to visit the S SAC website, to learn more about the committees’ responsibilities, who currently serves on the committee, access links to various forms, request the installation or operation of video surveillance, or to register systems with S SAC. You can also read the S SAC report to the academic senate, as well as contact S SAC with any questions or concerns pertaining to video surveillance. \n\nU Facilities serves as the steward of the video management system at the University of Utah. \nU Facilities is responsible for collecting monthly administration fees which are used for the installation, administration, and maintenance of the video management system (VMS.) \nU Facilities is also responsible for coordinating installations with approved vendors, administering the VMS, purchasing the appropriate licensing, and performing equipment maintenance, as well as upgrades. \nClick the buttons below to learn more about these stakeholders","jobId":"pjgpBbaEsGgSj9GAv","previewAssetId":"zsyyCCk3MerRQW8na","featureAdoption":{"isAddingPauses":true,"isUsingMultipleVoices":false,"isAdjustingSpeed":false},"voiceCodeUsed":"en-US-AshleyNeural"}},"9qrDTsdtKDCfCLS26":{"_id":"9qrDTsdtKDCfCLS26","_siteID":"WYXni539deYLSgKmq","data":{"attributes":{"template":"resourceAssessment","locale":"en","title":"Video Surveillance Knowledge Check 2"},"dates":{"dateCreated":"2025-10-29T16:17:54.752Z","dateModified":"2025-11-20T20:19:32.188Z"},"users":{"_userCreatorID":"PEGCiaSEEXjAgaPTR","_userModifierID":"PEGCiaSEEXjAgaPTR"},"assessment":{"graded":true,"includeInProjectResult":true,"passingGrade":100,"skipQuestions":false,"showFeedback":true,"questions":["tkkirxjLHFJjapDXi","cbguMCeDnLzeRgSDv"],"shuffleAnswers":false,"numberOfRetries":-2,"shuffle":true}},"workspaceId":"3XnwGZhHygpuHSSEF","assets":[],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[]},"Eyu6rihRpFE5oyuQW":{"_id":"Eyu6rihRpFE5oyuQW","_siteID":"WYXni539deYLSgKmq","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Statewide","upload":"T4EJJjkbuxs3PMxeW"},"dates":{"dateCreated":"2025-10-28T18:23:17.571Z","dateModified":"2026-04-08T22:07:26.169Z"},"users":{"_userCreatorID":"PEGCiaSEEXjAgaPTR","_userModifierID":"PTWyA9WgJBcxhkF32"},"video":{"autoPlay":true,"overlays":[{"identifier":"SNJ5KeSpkb7PQpE97","kind":"overlay","htmlConten l also set forth criteria for who may operate or access video surveillance.","startTime":37.299,"finishTime":42.34},{"text":"Policy 3-234 also sets forth the principles for operation of building access","startTime":43.549,"finishTime":49.88},{"text":"and other surveillance systems,","startTime":50.189,"finishTime":51.74},{"text":"as well as the collection,","startTime":51.75,"finishTime":53.139},{"text":"storage,","startTime":53.43,"finishTime":53.93},{"text":"disposal,","startTime":54.349,"finishTime":54.99},{"text":"access,","startTime":55.439,"finishTime":55.849},{"text":"and use of surveillance data.","startTime":56.15,"finishTime":57.509},{"text":"Surveillance data or recordings are the exclusive","startTime":58.63,"finishTime":61.79},{"text":"property of the University of Utah.","startTime":61.79,"finishTime":64.18},{"text":"Video surveillance shall not be used to record activities in private spaces,","startTime":64.589,"finishTime":68.989},{"text":"and any recording which may contain private information","startTime":69.23,"finishTime":72.269},{"text":"may only be reviewed in consultation with the Office of General Counsel.","startTime":72.55,"finishTime":76.629},{"text":"Signs must be posted in all buildings where video surveillance is in operation.","startTime":77.72,"finishTime":82.26},{"text":"Finally,","startTime":83.4,"finishTime":83.91},{"text":"policy 3-234 details the permissible and prohibited","startTime":84.199,"finishTime":88.669},{"text":"uses and purposes for surveillance data.","startTime":88.669,"finishTime":91.169},{"text":"Video surveillance may be regularly accessed","startTime":91.699,"finishTime":94.11},{"text":"for detecting or investigating criminal activity.","startTime":94.11,"finishTime":97.209},{"text":"Video surveillance may also be used for other purposes with approval from SSAC.","startTime":97.669,"finishTime":101.97},{"text":"Click the button below to learn more about policy 3-234,","startTime":103.3,"finishTime":108.04},{"text \n\t\u003cli>Privacy screen\u003c/li>\n\u003c/ul>\n","start":106.6,"behaviorType":"continue","rotationAngle":0,"duration":28.900000000000006}],"duration":173.975,"captions":[{"text":"Video surveillance shall be utilized in a responsible,","startTime":0.09,"finishTime":3.19},{"text":"legal,","startTime":3.41,"finishTime":4.09},{"text":"and ethical manner at the University of Utah.","startTime":4.289,"finishTime":6.809},{"text":"The following shall be considered in proper use.","startTime":7.84,"finishTime":10.22},{"text":"Discrimination or infringement of rights.","startTime":11.189,"finishTime":13.68},{"text":"Monitoring individuals based on characteristics of race,","startTime":14.829,"finishTime":18.219},{"text":"gender,","startTime":18.43,"finishTime":19.069},{"text":"ethnicity,","startTime":19.309,"finishTime":20.26},{"text":"sexual orientation,","startTime":20.549,"finishTime":22.19},{"text":"disability,","startTime":22.459,"finishTime":23.389},{"text":"national origin,","startTime":23.709,"finishTime":24.93},{"text":"or other protected classifications is prohibited.","startTime":25.19,"finishTime":28.17},{"text":"Furthermore,","startTime":28.909,"finishTime":29.629},{"text":"the use of video surveillance to infringe upon an individual's","startTime":29.95,"finishTime":33.029},{"text":"right to freedom of speech or assembly is also prohibited.","startTime":33.029,"finishTime":36.229},{"text":"Violations of privacy.","startTime":38.13,"finishTime":39.779},{"text":"Video surveillance may not be installed or operated in an","startTime":40.93,"finishTime":43.93},{"text":"area where there is a reasonable expectation of privacy.","startTime":43.93,"finishTime":46.99},{"text":"Examples include,","startTime":48.09,"finishTime":49.2},{"text":"but are not limited to","startTime":49.34,"finishTime":50.799},{"text":"bathrooms,","startTime":51.06,"finishTime":52.049},{"text":"locker rooms,","startTime":52.259,"finishTime":53.49},{"text":"and non-common areas.","startTime":53.779,"finishTime":55.34},{"text":"There are two exceptions as it pertains to privacy.","startTime":57,"finishTime":59.95},{"text":"First,","startTime":61.68,"finishTime":62.299},{"text":"the operation of covert video surveillance by","startTime":62.599,"finishTime":65.08},{"text":"the University of Utah Department of Public Safety","startTime":65.08,"finishTime":67.9},{"text":"in conjunction with a criminal investigation","startTime":68.08,"finishTime":70.18},{"text":"or legitimate security concern in an area","startTime":70.839,"finishTime":73.3},{"text":"not covered by existing cameras is permitted","startTime":73.3,"finishTime":75.919},{"text":"with the written approval of the Chief Safety Officer CSO.","startTime":76.12,"finishTime":79.94},{"text":"Second,","startTime":81.819,"finishTime":82.419},{"text":"the installation and operation of video surveillance","startTime":82.68,"finishTime":85.4},{"text":"to provide patient monitoring in clinical areas.","startTime":85.4,"finishTime":88.239},{"text":"Improper or unauthorized dissemination.","startTime":89.75,"finishTime":92.51},{"text":"The copying or duplication of video surveillance recording","startTime":93.599,"finishTime":96.68},{"text":"is limited to persons authorized by the CSO.","startTime":96.68,"finishTime":99.62},{"text":"Using an external device","startTime":100.86,"finishTime":102.66},{"text":"such as a phone to record video from a monitoring system is also prohibited.","startTime":103.019,"finishTime":107.22},{"text":"Information obtained from reviewing the surveillance recordings may not","startTime":108.26,"finishTime":111.699},{"text":"be disseminated without the written approval of the CSO.","startTime":111.699,"finishTime":114.8},{"text":"All requests to copy,","startTime":115.989,"finishTime":117.639},{"text":"duplicate,","startTime":117.8,"finishTime":118.639},{"text":"or share video surveillance recordings are subject to review by SSAC.","startTime":118.879,"finishTime":123.08},{"text":"Unauthorized access.","startTime":124.69,"finishTime":126.47},{"text":"Authorized individuals with access to operate video surveillance or review video","startTime":127.48,"finishTime":132},{"text":"surveillance recordings must take appropriate","startTime":132,"finishTime":134.08},{"text":"measures to prevent unauthorized access.","startTime":134.08,"finishTime":136.5},{"text":"For example,","startTime":137.919,"finishTime":138.88},{"text":"Authorized users shall not share their","startTime":139.5,"finishTime":141.699},{"text":"credentials to the video surveillance system.","startTime":141.699,"finishTime":143.72},{"text":"Workstations shall be locked when not in use.","startTime":144.679,"finishTime":147.46},{"text":"Monitor screens shall be positioned or have a privacy","startTime":148.119,"finishTime":150.919},{"text":"screen installed to prevent others from viewing video surveillance","startTime":150.919,"finishTime":154.38},{"text":"as a reminder.","startTime":154.96,"finishTime":156.039},{"text":"Access logs shall be reviewed periodically by SSAC.","startTime":157,"finishTime":160.72},{"text":"Violations of policy 3-234 are subject to disciplinary action.","startTime":161.369,"finishTime":166.63},{"text":"Improper usage or dissemination of information obtained from","startTime":167.33,"finishTime":170.69},{"text":"video surveillance shall be reported to  SSAC.","startTime":170.69,"finishTime":173.21}],"background":{"applyBackgroundImageToWholePage":false,"backgroundImageOpacity":100,"backgroundImageScaling":"fill","backgroundImagePosition":"middleCenter","backgroundColor":"koantic(light1, 0, 1)","backgroundImage":"kQx9pTdS8CjzsedXd"},"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["5NjF4qZqo4muNMDZf","kQx9pTdS8CjzsedXd"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"Q8Dj8Yk3d2iRPvLZX","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"norma ":\"\",\"text\":\"Violations of policy 3  dash 234 are subject to disciplinary action\",\"type\":\"text\",\"version\":1},{\"type\":\"textToSpeechBreak\",\"version\":1,\"duration\":0.3}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AshleyNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Improper usage or dissemination of information obtained from video surveillance shall be reported to S SAC.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AshleyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Video surveillance shall be utilized in a responsible, legal, and ethical manner at the University of Utah. The following shall be considered improper use:\nDiscrimination or infringement of rights. Monitoring individuals based on characteristics of race, gender, ethnicity, sexual orientation, disability, national origin, or other protected classifications is prohibited. Furthermore, the use of video surveillance to infringe upon an individual’s right to freedom of speech or assembly is also prohibited. \nViolations of Privacy. Video surveillance may not be installed or operated in an area where there is a reasonable expectation of privacy. Examples include but are not limited to: bathrooms, locker rooms, and non-common areas.\nThere are two exceptions as it pertains to privacy. \nFirst, the operation of covert video surveillance by the University of Utah Department of Public Safety, in conjunction with a criminal investigation, or legitimate security concern in an area not covered by existing cameras is permitted, with the written approval of the Chief Safety Officer (CSO.)\nSecond, the installation and operation of video surveillance to provide patient monitoring in clinical areas. \nImproper or unauthorized dissemination. The copying or duplication of video surveillance recording is limited to persons authorized by the CSO. Using an external device, such as a phone to record video from a monitoring system is also prohibited. Information obtained from reviewing the surveillance recordings may not be disseminated without the written approval of the CSO. All requests to copy, duplicate, or share video surveillance recordings are subject to review by S SAC. \nUnauthorized access. Authorized individuals with access to operate video surveillance or review video surveillance recordings must take appropriate measures to prevent unauthorized access. \nFor example: \nAuthorized users shall not share their credentials to the video surveillance system \nWork stations shall be locked when not in use\nMonitor screens shall be positioned or have a privacy screen installed to prevent others from viewing video surveillance \nAs a reminder: \nAccess logs shall be reviewed periodically by S SAC\nViolations of policy 3  dash 234 are subject to disciplinary action\nImproper usage or dissemination of information obtained from video surveillance shall be reported to S SAC.","featureAdoption":{"isAddingPauses":true,"isUsingMultipleVoices":false,"isAdjustingSpeed":false},"voiceCodeUsed":"en-US-AshleyNeural","previewAssetId":"5whcTiHqnMNzKj79Z"}},"Rtyq5t8SSN8TdGMk3":{"_id":"Rtyq5t8SSN8TdGMk3","_siteID":"WYXni539deYLSgKmq","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Welcome to Video Surveillance Training","upload":"3aFmmtAfuhziSgMig"},"dates":{"dateCreated":"2025-10-28T16:07:25.077Z","dateModified":"2026-04-08T22:07:20.412Z"},"users":{"_userCreatorID":"PEGCiaSEEXjAgaPTR","_userModifierID":"PTWyA9WgJBcxhkF32"},"video":{"autoPlay":true,"overlays":[{"identifier":"e6CBsFrKNtAfmfDy9","kind":"overlay","htmlContent":"\u003cdiv>\u003cspan style=\"color:rgba(190, 0, 0, 1)\">Welcome to Video Surveillance Training\u003c
